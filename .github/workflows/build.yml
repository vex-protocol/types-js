name: Build

on:
    pull_request:
        branches: [master]

concurrency:
    group: build-${{ github.event.pull_request.number }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            npm_config_save_exact: "true"
            npm_config_engine_strict: "true"
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - name: Install mise
              uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Build
              run: npm run build

            - name: Lint
              run: npm run lint

            - name: Format Check
              run: npm run format:check

            - name: Type Coverage
              run: npx type-coverage --at-least 99 --strict --ignore-catch

            - name: Type Tests
              run: npm run test:types

            - name: Package Lint
              run: npm run lint:pkg

            - name: Type Resolution
              run: npm run lint:types

            - name: API Surface
              run: npm run lint:api

            - name: Specs Drift Detection
              run: npm run specs:check

            - name: Lint OpenAPI & AsyncAPI Specs
              run: npm run lint:specs

            - name: Lint package.json
              run: npx npm-package-json-lint .

            - name: Check dependency licenses
              run: npm run license:check

            - name: Security audit
              run: npm audit --audit-level=high

            - name: Socket security scan
              if: github.event.pull_request.head.repo.full_name == github.repository
              run: npx @socketsecurity/cli@latest ci
              env:
                  SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_API_KEY }}

            - name: Check for changeset
              run: npx changeset status --since=origin/master

            - name: Package
              run: npm pack

            - name: Upload package tarball
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: package-tarball-${{ github.sha }}
                  path: "*.tgz"
                  retention-days: 14
